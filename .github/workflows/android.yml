name: Android Build

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "android/**"
  pull_request:
    branches: [main]
    paths:
      - "android/**"
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip unit tests'
        type: boolean
        default: false
      debug_only:
        description: 'Build debug APK only (skip release)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.11.1"

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release-keystore.jks

      - name: Run Unit Tests
        if: ${{ !inputs.skip_tests }}
        run: gradle testDebugUnitTest --no-daemon

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build Release APK
        if: ${{ !inputs.debug_only }}
        env:
          KEYSTORE_FILE: release-keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: clawd-mobile-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK
        if: ${{ !inputs.debug_only }}
        uses: actions/upload-artifact@v7
        with:
          name: clawd-mobile-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.11.1"

      - name: Lint
        run: gradle lint --no-daemon

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: android/app/build/reports/lint-results-*.html
          if-no-files-found: ignore
