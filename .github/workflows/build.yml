name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
      - run: npm run fetch:sidecars -- --target windows-x64,windows-arm64
      - run: node scripts/verify-sidecar-binaries.js prebuild:win:all
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/latest.yml

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run fetch:sidecars -- --target darwin-x64,darwin-arm64
      - run: node scripts/verify-sidecar-binaries.js prebuild:mac
      - run: npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            dist/*.dmg
            dist/latest-mac.yml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run fetch:sidecars -- --target linux-x64
      - run: node scripts/verify-sidecar-binaries.js prebuild:linux
      - run: npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml

  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.11.1"

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release-keystore.jks

      - name: Auto-increment version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "versionName=$TAG" >> "$GITHUB_OUTPUT"
          CURRENT=$(grep 'versionCode' app/build.gradle.kts | grep -oE '[0-9]+')
          NEW=$((CURRENT + 1))
          echo "versionCode=$NEW" >> "$GITHUB_OUTPUT"
          sed -i "s/versionCode = $CURRENT/versionCode = $NEW/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$TAG\"/" app/build.gradle.kts
          echo "Version: $CURRENT -> $NEW, Name: $TAG"

      - name: Build Release APK
        env:
          KEYSTORE_FILE: release-keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon

      - name: Rename APK
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/clawd-mobile-${TAG}.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Commit version bump to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "${GITHUB_WORKSPACE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add android/app/build.gradle.kts
          git commit -m "chore(android): bump version to ${{ steps.version.outputs.versionName }} (code ${{ steps.version.outputs.versionCode }}) [skip ci]"
          git push origin main

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-mac, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: docs/releases/release-${{ github.ref_name }}.md
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
